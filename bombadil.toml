dotfiles_dir = "dotfiles"

[[hook]]
command = "make desktop"

[[dot]]
source = "kitty"
target = ".config/kitty"

[[dot]]
source = "vim/vimrc-desktop"
target = ".config/nvim/init.vim"

[[dot]]
source = "vim/vimrc-server"
target = ".vimrc"

[[dot]]
source = "fish/config.fish"
target = ".config/fish/"

[[dot]]
source = "fish/fishfile"
target = ".config/fish/"

[[dot]]
source = "fish/functions/*.fish"
target = ".config/fish/functions/"

[[dot]]
source = "fish/completions/*.fish"
target = ".config/fish/completions/"

[[dot]]
source = "ag/agignore"
target = ".ignore"

[[dot]]
source = "rubocop"
target = ".config"

[[dot]]
source = "vale/vale.ini"
target = ".vale.ini"

[[dot]]
source = "proselint"
target = ".config/"

[[profiles.macos.dot]]
source = "Brewfile"
target = ".Brewfile"

[[profiles.macos.dot]]
source = "automation/karabiner"
target = ".config/karabiner"

[[profiles.macos.dot]]
source = "hammerspoon"
target = ".hammerspoon"

[[profiles.macos.dot]]
source = "vim/ginit.vim"
target = ".config/nvim/"

[[profiles.macos.dot]]
source = "ncspot/config.toml"
target = "Library/Preferences/org.affekt.ncspot/config.toml"

[[profiles.linux.dot]]
source = "ncspot/config.toml"
target = ".config/ncspot/config.toml"
